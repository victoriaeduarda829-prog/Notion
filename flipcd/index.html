<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net"></script>
    <style>
        body { 
            background: 191919; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            font-family: sans-serif;
        }
        .flipdown.flipdown__theme-dark { font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="flipdown" class="flipdown"></div>

    <script>
        const targetDate = new Date('Oct 15, 2026 00:00:00').getTime() / 1000;

        new FlipDown(targetDate)
            .start()
            .ifEnded(() => {
                console.log('Countdown finished!');
            });
    </script>
</body>
</html>
