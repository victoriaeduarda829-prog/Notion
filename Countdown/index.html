<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://googleapis.com" rel="stylesheet">
    <title>Notion Countdown</title>
    <style>
        body { background: #191919; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Lato', sans-serif; }
        
        #timer { text-align: center; text-transform: uppercase; font-size: .5em; letter-spacing: 1px; display: flex; gap: 6px; }

        .unit { padding: 10px 6px; width: 42px; border-radius: 6px; color: white; }
        .days { background: #81A6C6; }
        .hours { background: #eeeeee; color: #183059; }
        .minutes { background: #AACDDC; }
        .seconds { background: #D2C4B4; }
        .numbers { font-family: 'Montserrat', sans-serif; font-size: 1.7em; display: block; margin-bottom: 0px; }

        #container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px; 

    .title {
        color: white;
        font-family: 'Lato', sans-serif;
        font-size: 1.2em;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: bold;
    }
            
    </style>
</head>
<body>

<div id="container">
    <div class="title">Até eu me matar:</div> 
    
    <div id="timer">
        <div class="unit days"><span id="days" class="numbers">0</span> days</div>
        <div class="unit hours"><span id="hours" class="numbers">0</span> hours</div>
        <div class="unit minutes"><span id="minutes" class="numbers">0</span> mins</div>
        <div class="unit seconds"><span id="seconds" class="numbers">0</span> secs</div>
    </div>
</div>
  
<script>
    const targetDate = new Date('Oct 06, 2026 00:00:00').getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff <= 0) {
            document.getElementById("timer").innerHTML = "<h1 style='color:white; font-size: 1em;'>Goal Reached!</h1>";
            return;
        }

        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);

        document.getElementById("days").innerText = d;
        document.getElementById("hours").innerText = h;
        document.getElementById("minutes").innerText = m;
        document.getElementById("seconds").innerText = s;
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>
</body>
</html>
